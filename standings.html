    function LiveStandings() {
      const [draftedPlayers, setDraftedPlayers] = useState({});
      const [playerScores, setPlayerScores] = useState({});
      const [eliminatedSchools, setEliminatedSchools] = useState(new Set());
      const [loading, setLoading] = useState(false);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [selectedTeam, setSelectedTeam] = useState(null);
      const [adminMode, setAdminMode] = useState(false);
      const [showPasswordPrompt, setShowPasswordPrompt] = useState(false);
      const [showScoreAdjust, setShowScoreAdjust] = useState(null);

      useEffect(() => {
        try {
          const saved = localStorage.getItem('potterCupDraftState');
          if (saved) {
            setDraftedPlayers(JSON.parse(saved));
          }
        } catch (e) {
          console.error('Failed to load draft state:', e);
        }

        // Load saved scores
        try {
          const savedScores = localStorage.getItem('potterCupPlayerScores');
          if (savedScores) {
            setPlayerScores(JSON.parse(savedScores));
          }
        } catch (e) {
          console.error('Failed to load scores:', e);
        }

        // Load eliminated schools
        try {
          const savedEliminated = localStorage.getItem('potterCupEliminatedSchools');
          if (savedEliminated) {
            setEliminatedSchools(new Set(JSON.parse(savedEliminated)));
          }
        } catch (e) {
          console.error('Failed to load eliminated schools:', e);
        }

        // Load last update time
        try {
          const saved = localStorage.getItem('potterCupLastScoreUpdate');
          if (saved) {
            setLastUpdate(new Date(saved));
          }
        } catch (e) {}
      }, []);

      // Auto-refresh every 5 minutes
      useEffect(() => {
        const interval = setInterval(() => {
          if (!adminMode) {
            fetchLatestScores();
          }
        }, 5 * 60 * 1000); // 5 minutes

        return () => clearInterval(interval);
      }, [adminMode]);

      const fetchLatestScores = async () => {
        setLoading(true);
        try {

          // For now, using placeholder data structure
          console.log('Fetching NCAA tournament data...');
          
          // TODO: Integrate with actual API

          localStorage.setItem('potterCupLastScoreUpdate', new Date().toISOString());

          console.error('Failed to fetch scores:', error);
        } finally {
          setLoading(false);
        }
      };

        e.preventDefault();
        const password = e.target.password.value;

          setAdminMode(true);
          setShowPasswordPrompt(false);
        } else {
          alert('Incorrect password!');
        }
        e.target.password.value = '';

        const updated = { ...playerScores, [playerId]: parseFloat(newScore) || 0 };
        setPlayerScores(updated);
        localStorage.setItem('potterCupPlayerScores', JSON.stringify(updated));
        setShowScoreAdjust(null);
      };

        const updated = new Set(eliminatedSchools);
        if (updated.has(school)) {
          updated.delete(school);
        } else {
          updated.add(school);
        }
        setEliminatedSchools(updated);
        localStorage.setItem('potterCupEliminatedSchools', JSON.stringify([...updated]));
      };

      // Calculate team standings
      const standings = useMemo(() => {
        const teamScores = {};
        const teamPlayers = {};
        const teamActivePlayers = {};

        TEAM_NAMES.forEach(team => {
          teamScores[team] = 0;
          teamPlayers[team] = [];
          teamActivePlayers[team] = 0;
        });

        Object.entries(draftedPlayers).forEach(([playerId, team]) => {
          const player = ALL_PLAYERS.find(p => p.id === parseInt(playerId));

            const score = playerScores[playerId] || 0;
            teamScores[team] += score;
            teamPlayers[team].push({ ...player, tournamentScore: score });
            
            if (!eliminatedSchools.has(player.school)) {
              teamActivePlayers[team]++;
            }
          }
        });

          name: team,
          totalScore: teamScores[team],
          players: teamPlayers[team].sort((a, b) => b.tournamentScore - a.tournamentScore),
          activePlayers: teamActivePlayers[team]

                  <button
                    onClick={() => setAdminMode(!adminMode) || setShowPasswordPrompt(true)}
                    className={"px-4 py-2 rounded-lg font-semibold transition-colors " + (adminMode ? "bg-yellow-400 text-gray-900" : "bg-white/20 text-white hover:bg-white/30")}
                  >
                    {adminMode ? "🔓 Admin Mode" : "🔒 Admin"}
                  </button>
                  <button
                    onClick={fetchLatestScores}
                    disabled={loading}
                    className="bg-white text-[#009CDE] px-4 py-2 rounded-lg font-semibold hover:bg-[#E6F7FF] transition-colors disabled:opacity-50"
                  >
                    {loading ? '⏳ Updating...' : '🔄 Refresh Scores'}
                  </button>
                  <a 
                    href="index.html"
                    className="bg-white/20 text-white px-4 py-2 rounded-lg font-semibold hover:bg-white/30 transition-colors"
                  >
                    ← Back to Draft
                  </a>
                </div>
              </div>
            </div>
          </header>

          {showPasswordPrompt && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
              <div className="bg-white rounded-lg p-6 max-w-sm w-full">
                <h3 className="text-lg font-bold mb-4">Admin Password Required</h3>
                <form onSubmit={handlePasswordSubmit}>
                  <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    className="w-full px-3 py-2 border rounded mb-4"
                    autoFocus
                  />
                  <div className="flex gap-2">
                    <button type="submit" className="flex-1 bg-[#009CDE] text-white px-4 py-2 rounded hover:bg-[#0077C8]">
                      Login
                    </button>
                    <button type="button" onClick={() => setShowPasswordPrompt(false)} className="flex-1 bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400">
                      Cancel
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Main Content */}
          <div className="max-w-7xl mx-auto px-4 py-6">
            {/* Leaderboard */}
            <div className="bg-white rounded-lg shadow-lg overflow-hidden mb-6">
              <div className="bg-gradient-to-r from-gray-800 to-gray-900 text-white px-6 py-4">
                <h2 className="text-2xl font-bold">Leaderboard</h2>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead className="bg-gray-50">
                    <tr>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Rank</th>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Team</th>
                      <th className="px-6 py-3 text-center text-xs font-medium text-gray-700 uppercase">Total Points</th>
                      <th className="px-6 py-3 text-center text-xs font-medium text-gray-700 uppercase">Active Players</th>
                      <th className="px-6 py-3 text-center text-xs font-medium text-gray-700 uppercase">Total Players</th>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-200">
                    {standings.map((team, idx) => (
                      <tr key={team.name} className={"hover:bg-blue-50 " + (idx === 0 ? "bg-yellow-50" : "")}>
                        <td className="px-6 py-4">
                          <div className="flex items-center gap-2">
                            {idx === 0 && <span className="text-2xl">🥇</span>}
                            {idx === 1 && <span className="text-2xl">🥈</span>}
                            {idx === 2 && <span className="text-2xl">🥉</span>}
                            <span className="font-bold text-lg">{idx + 1}</span>
                          </div>
                        </td>
                        <td className="px-6 py-4 font-semibold text-gray-900">{team.name}</td>
                        <td className="px-6 py-4 text-center">
                          <span className="text-2xl font-black text-[#009CDE]">{team.totalScore.toFixed(1)}</span>
                        </td>
                        <td className="px-6 py-4 text-center">
                          <span className={"text-lg font-bold " + (team.activePlayers > 0 ? "text-green-600" : "text-red-600")}>
                            {team.activePlayers}
                          </span>
                        </td>
                        <td className="px-6 py-4 text-center text-gray-600">
                          {team.players.length}
                        </td>
                        <td className="px-6 py-4">
                          <button
                            onClick={() => setSelectedTeam(team)}
                            className="text-[#009CDE] hover:text-[#0077C8] font-semibold text-sm"
                          >
                            View Roster →
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Team Detail Modal */}
            {selectedTeam && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={() => setSelectedTeam(null)}>
                <div className="bg-white rounded-lg shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden" onClick={(e) => e.stopPropagation()}>
                  <div className="bg-gradient-to-r from-[#009CDE] to-[#0077C8] text-white p-6">
                    <h2 className="text-2xl font-bold">{selectedTeam.name}</h2>
                    <p className="text-sm opacity-90 mt-1">
                      Total Score: {selectedTeam.totalScore.toFixed(1)} pts • 
                      {selectedTeam.activePlayers} active • {selectedTeam.players.length} total players
                    </p>
                  </div>
                  <div className="overflow-y-auto max-h-[calc(90vh-120px)]">
                    <table className="w-full">
                      <thead className="bg-gray-50 sticky top-0">
                        <tr>
                          <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase">Player</th>
                          <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase">School</th>
                          <th className="px-4 py-3 text-center text-xs font-medium text-gray-700 uppercase">Seed</th>
                          <th className="px-4 py-3 text-center text-xs font-medium text-gray-700 uppercase">Status</th>
                          <th className="px-4 py-3 text-center text-xs font-medium text-gray-700 uppercase">Tournament Pts</th>
                          {adminMode && (
                            <th className="px-4 py-3 text-center text-xs font-medium text-gray-700 uppercase">Adjust</th>
                          )}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-200">
                        {selectedTeam.players.map(player => (
                          <tr key={player.id} className={"hover:bg-blue-50 " + (eliminatedSchools.has(player.school) ? "bg-red-50 opacity-60" : "")}>
                            <td className="px-4 py-3 font-medium text-gray-900">{player.name}</td>
                            <td className="px-4 py-3 text-sm text-gray-600">{player.school}</td>
                            <td className="px-4 py-3 text-center text-sm font-semibold">{player.seed}</td>
                            <td className="px-4 py-3 text-center">
                              {eliminatedSchools.has(player.school) ? (
                                <span className="text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full">❌ Eliminated</span>
                              ) : (
                                <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">✅ Active</span>
                              )}
                            </td>
                            <td className="px-4 py-3 text-center text-lg font-bold text-[#009CDE]">
                              {player.tournamentScore.toFixed(1)}
                            </td>
                            {adminMode && (
                              <td className="px-4 py-3 text-center">
                                <button
                                  onClick={() => setShowScoreAdjust(player)}
                                  className="text-xs px-2 py-1 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded"
                                >
                                  Edit
                                </button>
                              </td>
                            )}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div className="p-4 bg-gray-50 border-t flex justify-end">
                    <button onClick={() => setSelectedTeam(null)} className="px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">
                      Close
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Score Adjustment Modal */}
            {showScoreAdjust && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div className="bg-white rounded-lg p-6 max-w-md w-full">
                  <h3 className="text-lg font-bold mb-4">Adjust Score: {showScoreAdjust.name}</h3>
                  <p className="text-sm text-gray-600 mb-4">{showScoreAdjust.school} • Current: {showScoreAdjust.tournamentScore.toFixed(1)} pts</p>
                  <form onSubmit={(e) => {
                    e.preventDefault();
                    handleScoreAdjustment(showScoreAdjust.id, e.target.score.value);
                  }}>
                    <input
                      type="number"
                      name="score"
                      step="0.1"
                      defaultValue={showScoreAdjust.tournamentScore}
                      className="w-full px-3 py-2 border rounded mb-4"
                      autoFocus
                    />
                    <div className="flex gap-2">
                      <button type="submit" className="flex-1 bg-[#009CDE] text-white px-4 py-2 rounded hover:bg-[#0077C8]">
                        Save
                      </button>
                      <button type="button" onClick={() => setShowScoreAdjust(null)} className="flex-1 bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400">
                        Cancel
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {/* Admin Controls */}
            {adminMode && (
              <div className="bg-white rounded-lg shadow-lg p-6">
                <h3 className="text-lg font-bold mb-4">Admin Controls</h3>
                <div className="space-y-4">
                  <div>
                    <h4 className="font-semibold mb-2">Eliminated Schools</h4>
                    <div className="grid grid-cols-3 gap-2">
                      {[...new Set(ALL_PLAYERS.map(p => p.school))].sort().map(school => (
                        <button
                          key={school}
                          onClick={() => handleToggleEliminated(school)}
                          className={`text-xs px-3 py-2 rounded ${
                            eliminatedSchools.has(school)
                              ? "bg-red-100 text-red-700 hover:bg-red-200"
                              : "bg-green-100 text-green-700 hover:bg-green-200"
                          }`}
                        >
                          {eliminatedSchools.has(school) ? "❌" : "✅"} {school}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<LiveStandings />, document.getElementById('root'));
  </script>
</body>
</html>
