      const [players] = useState(PLAYERS_DATA);
      const [teams] = useState(TEAM_NAMES);
      
      const [playerScores, setPlayerScores] = useState(() => {

        } catch (e) {
          return {};
        }
      });

      const [eliminatedSchools, setEliminatedSchools] = useState(() => {

        } catch (e) {

        }
      });

      const [draftState, setDraftState] = useState(() => {

          return saved ? JSON.parse(saved) : {};
        } catch (e) {
          return {};
        }
      });

      const [lastUpdate, setLastUpdate] = useState(() => {
        try {
          const saved = localStorage.getItem('potterCupLastScoreUpdate');
          return saved || null;
        } catch (e) {
          return null;
        }
      });

      const [selectedTeam, setSelectedTeam] = useState(null);

      const [editValues, setEditValues] = useState({});

      const uniqueSchools = useMemo(() => {
        return [...new Set(players.map(p => p.school))].sort();
      }, [players]);

      useEffect(() => {
        const interval = setInterval(() => {
          try {
            const saved = localStorage.getItem('potterCupPlayerScores');
            if (saved) setPlayerScores(JSON.parse(saved));
            
            const savedElim = localStorage.getItem('potterCupEliminatedSchools');
            if (savedElim) setEliminatedSchools(JSON.parse(savedElim));
            
            const savedUpdate = localStorage.getItem('potterCupLastScoreUpdate');

          } catch (e) {
            console.error('Failed to sync standings:', e);
          }
        }, 5000);

        return () => clearInterval(interval);
      }, []);

      const getPlayersByTeam = (team) => {
        return Object.entries(draftState)

            const pickNumber = pickOrder[playerId];
            return { ...player, pickNumber };
          })
          .filter(player => player && player.id)
          .sort((a, b) => (a.pickNumber || 999) - (b.pickNumber || 999));

        const roster = getPlayersByTeam(team);
        return roster.reduce((sum, player) => sum + getPlayerTotalScore(player.id), 0);

      const isPlayerEliminated = (player) => {
        return eliminatedSchools.includes(player.school);
      };

      const getRoundScore = (playerId, round) => {
        const scores = playerScores[playerId] || {};
        return scores[round] || 0;
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <header className="bg-gradient-to-r from-[#009CDE] to-[#0077C8] text-white shadow-lg">
            <div className="max-w-7xl mx-auto px-4 py-6">
              <div className="flex justify-between items-center">
                <div>
                  <h1 className="text-3xl font-bold">🏆 Potter Cup Live Standings</h1>
                  <p className="text-[#E6F7FF] mt-1">2026 NCAA Tournament</p>
                  {lastUpdate && (
                    <p className="text-xs text-[#E6F7FF] mt-1">Last updated: {lastUpdate}</p>
                  )}
                </div>
                <div className="flex gap-3">
                  <button
                    onClick={handleAdminToggle}
                    className={"px-4 py-2 rounded-lg font-semibold transition-colors " + (adminMode ? "bg-yellow-400 text-gray-900" : "bg-white/20 text-white hover:bg-white/30")}
                  >
                    {adminMode ? "🔓 Admin Mode" : "🔒 Admin"}
                  </button>
                  <a 
                    href="index.html.html"
                    className="bg-white text-[#009CDE] px-4 py-2 rounded-lg font-semibold hover:bg-[#E6F7FF] transition-colors"
                  >
                    ← Back to Draft
                  </a>
                </div>
              </div>
            </div>
          </header>

          {showPasswordPrompt && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
              <div className="bg-white rounded-lg p-6 max-w-sm w-full">
                <h3 className="text-lg font-bold mb-4">Admin Password Required</h3>
                <form onSubmit={handlePasswordSubmit}>
                  <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    className="w-full px-3 py-2 border rounded mb-4"
                    autoFocus
                  />
                  <div className="flex gap-2">
                    <button type="submit" className="flex-1 bg-[#009CDE] text-white px-4 py-2 rounded hover:bg-[#0077C8]">
                      Login
                    </button>
                    <button
                      type="button"
                      onClick={() => setShowPasswordPrompt(false)}
                      className="flex-1 bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400"
                    >
                      Cancel
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {selectedTeam && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-lg max-w-6xl w-full max-h-[90vh] overflow-hidden flex flex-col">
                <div className="p-6 border-b bg-gray-50 flex justify-between items-center">
                  <div>
                    <h2 className="text-2xl font-bold text-gray-900">{selectedTeam}</h2>
                    <p className="text-sm text-gray-600 mt-1">Tournament Round-by-Round Scoring</p>
                  </div>
                  <button
                    onClick={() => { setSelectedTeam(null); setEditingPlayer(null); }}
                    className="text-gray-500 hover:text-gray-700 text-3xl leading-none"
                  >
                    ×
                  </button>
                </div>

                <div className="overflow-auto flex-1 p-6">
                  <table className="w-full border-collapse">
                    <thead>
                      <tr className="bg-gray-100">
                        <th className="border px-3 py-2 text-left font-semibold">Player</th>
                        <th className="border px-3 py-2 text-center font-semibold text-xs">R64</th>
                        <th className="border px-3 py-2 text-center font-semibold text-xs">R32</th>
                        <th className="border px-3 py-2 text-center font-semibold text-xs">S16</th>
                        <th className="border px-3 py-2 text-center font-semibold text-xs">E8</th>
                        <th className="border px-3 py-2 text-center font-semibold text-xs">FF</th>
                        <th className="border px-3 py-2 text-center font-semibold text-xs">Final</th>
                        <th className="border px-3 py-2 text-center font-semibold bg-blue-50">Total</th>
                        {adminMode && <th className="border px-3 py-2 text-center font-semibold">Action</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {getPlayersByTeam(selectedTeam).map(player => {
                        const isEliminated = isPlayerEliminated(player);
                        const isEditing = editingPlayer === player.id;
                        const total = getPlayerTotalScore(player.id);

                        return (
                          <tr key={player.id} className={isEliminated ? "bg-red-50" : "hover:bg-blue-50"}>
                            <td className="border px-3 py-2">
                              <div className="flex items-center gap-2">
                                <span className="text-xs font-semibold text-gray-500 bg-gray-100 px-2 py-0.5 rounded">
                                  R{Math.ceil(player.pickNumber / 12)}
                                </span>
                                <div>
                                  <div className="font-medium">
                                    {player.name}
                                    {player.injuryStatus && <span className="ml-1 text-yellow-500">⚡</span>}
                                  </div>
                                  <div className="text-xs text-gray-600">{player.school}</div>
                                </div>
                              </div>
                            </td>
                            {TOURNAMENT_ROUNDS.map(round => {
                              const score = getRoundScore(player.id, round);
                              const shouldShowX = isEliminated;
                              
                              if (isEditing) {
                                return (
                                  <td key={round} className="border px-2 py-1 text-center">
                                    <input
                                      type="number"
                                      step="0.1"
                                      value={editValues[round] || ''}
                                      onChange={(e) => setEditValues(prev => ({ ...prev, [round]: e.target.value }))}
                                      className="w-16 px-2 py-1 border rounded text-center text-sm"
                                      placeholder="0"
                                    />
                                  </td>
                                );
                              }
                              
                              return (
                                <td key={round} className="border px-3 py-2 text-center">
                                  {shouldShowX && score === 0 ? (
                                    <span className="text-red-500 font-bold">❌</span>
                                  ) : (
                                    <span className={score > 0 ? "font-semibold text-[#009CDE]" : "text-gray-400"}>
                                      {score || '—'}
                                    </span>
                                  )}
                                </td>
                              );
                            })}
                            <td className="border px-3 py-2 text-center font-bold text-lg bg-blue-50">
                              {total || 0}
                            </td>
                            {adminMode && (
                              <td className="border px-3 py-2 text-center">
                                {isEditing ? (
                                  <div className="flex gap-1 justify-center">
                                    <button
                                      onClick={() => handleSavePlayer(player.id)}
                                      className="px-2 py-1 bg-green-600 text-white text-xs rounded hover:bg-green-700"
                                    >
                                      Save
                                    </button>
                                    <button
                                      onClick={() => { setEditingPlayer(null); setEditValues({}) }}
                                      className="px-2 py-1 bg-gray-400 text-white text-xs rounded hover:bg-gray-500"
                                    >
                                      Cancel
                                    </button>
                                  </div>
                                ) : (
                                  <button
                                    onClick={() => handleEditPlayer(player)}
                                    className="px-3 py-1 bg-[#009CDE] text-white text-xs rounded hover:bg-[#0077C8]"
                                  >
                                    Edit
                                  </button>
                                )}
                              </td>
                            )}
                          </tr>
                        );
                      })}
                      <tr className="bg-gray-100 font-bold">
                        <td className="border px-3 py-2">ROUND TOTALS</td>
                        {TOURNAMENT_ROUNDS.map(round => {
                          const roundTotal = getPlayersByTeam(selectedTeam).reduce((sum, p) => 
                            sum + (parseFloat(getRoundScore(p.id, round)) || 0), 0
                          );
                          return (
                            <td key={round} className="border px-3 py-2 text-center">
                              {roundTotal.toFixed(1)}
                            </td>
                          );
                        })}
                        <td className="border px-3 py-2 text-center text-lg bg-blue-100">
                          {getTeamScore(selectedTeam).toFixed(1)}
                        </td>
                        {adminMode && <td className="border"></td>}
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          <main className="max-w-7xl mx-auto px-4 py-8">
            <div className="bg-white rounded-lg shadow-lg overflow-hidden mb-8">
              <div className="px-6 py-4 bg-gray-50 border-b">
                <h2 className="text-xl font-bold text-gray-900">Leaderboard</h2>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead className="bg-gray-50">
                    <tr>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Rank</th>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Team</th>
                      <th className="px-6 py-3 text-center text-xs font-medium text-gray-700 uppercase">Active Players</th>
                      <th className="px-6 py-3 text-center text-xs font-medium text-gray-700 uppercase">Total Points</th>
                      <th className="px-6 py-3 text-center text-xs font-medium text-gray-700 uppercase">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y">
                    {leaderboard.map((item, idx) => (
                      <tr key={item.team} className="hover:bg-blue-50">
                        <td className="px-6 py-4 text-2xl">
                          {idx === 0 && '🥇'}
                          {idx === 1 && '🥈'}
                          {idx === 2 && '🥉'}
                          {idx > 2 && (idx + 1)}
                        </td>
                        <td className="px-6 py-4 font-semibold text-gray-900">{item.team}</td>
                        <td className="px-6 py-4 text-center">
                          <span className={item.activePlayers > 0 ? "text-green-600 font-semibold" : "text-red-600"}>
                            {item.activePlayers}
                          </span>
                          <span className="text-gray-400"> / {item.totalPlayers}</span>
                        </td>
                        <td className="px-6 py-4 text-center text-2xl font-bold text-[#009CDE]">
                          {item.score.toFixed(1)}
                        </td>
                        <td className="px-6 py-4 text-center">
                          <button
                            onClick={() => setSelectedTeam(item.team)}
                            className="px-4 py-2 bg-[#009CDE] text-white rounded-lg hover:bg-[#0077C8] transition-colors text-sm font-semibold"
                          >
                            View Roster
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {adminMode && (
              <div className="bg-white rounded-lg shadow-lg overflow-hidden">
                <div className="px-6 py-4 bg-yellow-50 border-b">
                  <h2 className="text-xl font-bold text-gray-900">🔧 Admin Controls - Eliminated Schools</h2>
                  <p className="text-sm text-gray-600 mt-1">Toggle schools to mark them as eliminated. Players from eliminated schools will show ❌ in remaining rounds.</p>
                </div>
                <div className="p-6">
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                    {uniqueSchools.map(school => {
                      const isEliminated = eliminatedSchools.includes(school);
                      return (
                        <button
                          key={school}
                          onClick={() => handleToggleEliminated(school)}
                          className={`px-3 py-2 rounded text-sm font-medium transition-colors ${
                            isEliminated 
                              ? "bg-red-100 text-red-700 hover:bg-red-200" 
                              : "bg-green-100 text-green-700 hover:bg-green-200"
                          }`}
                        >
                          {isEliminated ? "❌" : "✅"} {school}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PotterCupStandings />);
  </script>
</body>
</html>
