    function PotterCup() {
      const [players] = useState(PLAYERS_DATA);
      const [sortConfig, setSortConfig] = useState({ key: 'seasonPPG', direction: 'desc' });
      const [searchTerm, setSearchTerm] = useState('');
      const [schoolFilter, setSchoolFilter] = useState('ALL');
      const [confFilter, setConfFilter] = useState('ALL');

      // Get unique schools and conferences
      const uniqueSchools = useMemo(() => {
        return [...new Set(players.map(p => p.school))].sort();
      }, [players]);

      const uniqueConferences = useMemo(() => {
        return [...new Set(players.map(p => p.conf))].sort();
      }, [players]);

      // Sorted and filtered players
      const sortedPlayers = useMemo(() => {
        let filtered = [...players];
        
        if (searchTerm) {
          filtered = filtered.filter(p => 
            p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
            p.school.toLowerCase().includes(searchTerm.toLowerCase())
          );
        }
        
        if (schoolFilter !== 'ALL') {
          filtered = filtered.filter(p => p.school === schoolFilter);
        }

        if (confFilter !== 'ALL') {
          filtered = filtered.filter(p => p.conf === confFilter);
        }
        
        return filtered.sort((a, b) => {
          if (a[sortConfig.key] < b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? -1 : 1;
          }
          if (a[sortConfig.key] > b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? 1 : -1;
          }
          return 0;
        });
      }, [players, sortConfig, searchTerm, schoolFilter, confFilter]);

      const handleSort = (key) => {
        setSortConfig(prev => ({
          key,
          direction: prev.key === key && prev.direction === 'desc' ? 'asc' : 'desc'
        }));
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <header className="bg-gradient-to-r from-[#009CDE] to-[#0077C8] text-white shadow-lg">

              <p className="text-[#E6F7FF] mt-1">NCAA Men's Basketball Tournament Draft - Player Cheatsheet</p>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-6">
            <div className="bg-white rounded-lg shadow">

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                  <input
                    type="text"
                    placeholder="Search by player name or school..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#009CDE] focus:border-transparent"
                  />
                  <select
                    value={confFilter}
                    onChange={(e) => setConfFilter(e.target.value)}
                    className="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#009CDE] focus:border-transparent"
                  >
                    <option value="ALL">All Conferences</option>
                    {uniqueConferences.map(conf => (
                      <option key={conf} value={conf}>{conf}</option>
                    ))}
                  </select>
                  <select
                    value={schoolFilter}
                    onChange={(e) => setSchoolFilter(e.target.value)}
                    className="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#009CDE] focus:border-transparent"
                  >
                    <option value="ALL">All Schools</option>
                    {uniqueSchools.map(school => (
                      <option key={school} value={school}>{school}</option>
                    ))}
                  </select>
                </div>

                <div className="text-sm text-gray-600">
                  Showing {sortedPlayers.length} of {players.length} players
                </div>
              </div>

              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead className="bg-gray-50 sticky top-0">
                    <tr>
                      <th 
                        onClick={() => handleSort('name')}
                        className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                      >
                        Player {sortConfig.key === 'name' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('school')}
                        className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                      >
                        School {sortConfig.key === 'school' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('position')}
                        className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                      >
                        Position {sortConfig.key === 'position' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('conf')}
                        className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                      >
                        Conf {sortConfig.key === 'conf' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('year')}
                        className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                      >
                        Year {sortConfig.key === 'year' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">
                        Seed
                      </th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">
                        Region
                      </th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">
                        R1 Opponent
                      </th>
                      <th 
                        onClick={() => handleSort('seasonPPG')}
                        className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                      >
                        PPG {sortConfig.key === 'seasonPPG' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                    </tr>
                  </thead>
                  <tbody className="bg-white divide-y divide-gray-200">
                    {sortedPlayers.map((player) => (
                      <tr key={player.id} className="hover:bg-gray-50">
                        <td className="px-4 py-3 whitespace-nowrap font-medium text-gray-900">
                          {player.name}
                        </td>
                        <td className="px-4 py-3 whitespace-nowrap text-gray-700">{player.school}</td>
                        <td className="px-4 py-3 whitespace-nowrap text-gray-600 text-sm">{player.position}</td>
                        <td className="px-4 py-3 whitespace-nowrap">
                          <span className="px-2 py-1 text-xs font-semibold rounded-full bg-[#009CDE]/20 text-[#009CDE]">
                            {player.conf}
                          </span>
                        </td>
                        <td className="px-4 py-3 whitespace-nowrap text-gray-600 text-sm">{player.year}</td>
                        <td className="px-4 py-3 whitespace-nowrap text-sm text-gray-500">{player.seed || '-'}</td>
                        <td className="px-4 py-3 whitespace-nowrap text-gray-600">{player.region || '-'}</td>
                        <td className="px-4 py-3 whitespace-nowrap text-sm text-gray-600">{player.opponent || '-'}</td>
                        <td className="px-4 py-3 whitespace-nowrap font-bold text-lg text-[#009CDE]">{player.seasonPPG}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </main>

          <footer className="bg-white border-t mt-12 py-6">
            <div className="max-w-7xl mx-auto px-4 text-center text-gray-600 text-sm">
              <p>Potter Cup • NCAA Tournament Draft Tracker</p>
              <p className="mt-1">Real 2025-26 season stats • Top 500 D1 scorers • Ready for March 2026!</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<PotterCup />, document.getElementById('root'));
  </script>
