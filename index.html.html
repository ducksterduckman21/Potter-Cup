      const [players, setPlayers] = useState(MOCK_PLAYERS);
      const [teams, setTeams] = useState(MOCK_TEAMS.slice(0, 8));
      const [draftedPlayers, setDraftedPlayers] = useState({});
      const [currentPick, setCurrentPick] = useState(1);
      const [currentRound, setCurrentRound] = useState(1);

      const [searchTerm, setSearchTerm] = useState('');
      const [positionFilter, setPositionFilter] = useState('ALL');
      const [lastUpdate, setLastUpdate] = useState(new Date());

      // Calculate draft order based on snake draft with re-randomization every 2 rounds
      const getDraftOrder = () => {
        const order = [];
        let baseOrder = teams.map((_, idx) => idx);
        
        for (let round = 1; round <= 12; round++) {
          // Re-randomize every 2 rounds (rounds 1-2, 3-4, 5-6, etc.)
          if ((round - 1) % 2 === 0 && round > 1) {
            // For demo, we'll just reverse - in real app, you'd randomize
            baseOrder = [...baseOrder].reverse();
          }
          
          // Snake: odd rounds go forward, even rounds go backward
          if (round % 2 === 1) {
            order.push(...baseOrder);
          } else {
            order.push(...[...baseOrder].reverse());
          }
        }
        
        return order;
      };

      const draftOrder = getDraftOrder();
      const currentTeamIndex = draftOrder[currentPick - 1];
      const currentTeamOnClock = teams[currentTeamIndex];

      // Sorting logic
      const sortedPlayers = useMemo(() => {
        let filteredPlayers = players.filter(p => !draftedPlayers[p.id]);
        
        // Apply search filter
        if (searchTerm) {
          filteredPlayers = filteredPlayers.filter(p => 
            p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
            p.school.toLowerCase().includes(searchTerm.toLowerCase())
          );
        }
        
        // Apply position filter
        if (positionFilter !== 'ALL') {
          filteredPlayers = filteredPlayers.filter(p => p.position === positionFilter);
        }
        
        // Apply sorting
        return [...filteredPlayers].sort((a, b) => {
          if (a[sortConfig.key] < b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? -1 : 1;
          }
          if (a[sortConfig.key] > b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? 1 : -1;
          }
          return 0;
        });
      }, [players, draftedPlayers, sortConfig, searchTerm, positionFilter]);

      const handleSort = (key) => {
        setSortConfig(prev => ({
          key,
          direction: prev.key === key && prev.direction === 'desc' ? 'asc' : 'desc'
        }));
      };

      const handleDraft = (player) => {
        if (currentPick > teams.length * 12) return;
        
        setDraftedPlayers(prev => ({
          ...prev,
          [player.id]: currentTeamOnClock
        }));
        
        setCurrentPick(prev => prev + 1);
        if (currentPick % teams.length === 0) {

        }
      };

        return Object.entries(draftedPlayers)

              let teamTotal = 0;

                const r64 = Math.floor(Math.random() * 30);
                const r32 = Math.random() > 0.5 ? Math.floor(Math.random() * 30) : 0;
                const s16 = Math.random() > 0.7 ? Math.floor(Math.random() * 30) : 0;
                const e8 = Math.random() > 0.85 ? Math.floor(Math.random() * 30) : 0;
                const f4 = Math.random() > 0.93 ? Math.floor(Math.random() * 30) : 0;
                const finals = Math.random() > 0.97 ? Math.floor(Math.random() * 30) : 0;
                
                teamTotal += r64 + r32 + s16 + e8 + f4 + finals;
              });
              
              updated[team] = {
                total: teamTotal,
                players: roster,
                byRound: {}
              };
            });
            
            return updated;
          });
          
          setLastUpdate(new Date());
        }, 120000); // 2 minutes
        
        return () => clearInterval(interval);

        setLastUpdate(new Date());
        // Trigger a score update
      };

            players: data.players

                      </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-gray-200">
                      {sortedPlayers.map((player) => (
                        <tr 
                          key={player.id}
                          className={`hover:bg-gray-50 ${draftedPlayers[player.id] ? 'opacity-40 line-through' : ''}`}
                        >
                          <td className="px-4 py-3 whitespace-nowrap font-medium text-gray-900">
                            {player.name}
                            {draftedPlayers[player.id] && (
                              <span className="ml-2 text-xs text-[#009CDE]">({draftedPlayers[player.id]})</span>
                            )}
                          </td>
                          <td className="px-4 py-3 whitespace-nowrap text-gray-700">{player.school}</td>
                          <td className="px-4 py-3 whitespace-nowrap text-gray-600">{player.position}</td>
                          <td className="px-4 py-3 whitespace-nowrap">
                            <span className="px-2 py-1 text-xs font-semibold rounded-full bg-[#009CDE]/20 text-[#009CDE]">
                              {player.seed}
                            </span>
                          </td>
                          <td className="px-4 py-3 whitespace-nowrap text-gray-600">{player.region}</td>
                          <td className="px-4 py-3 whitespace-nowrap text-sm text-gray-600">{player.opponent}</td>
                          <td className="px-4 py-3 whitespace-nowrap font-semibold text-gray-900">{player.seasonPPG}</td>
                          <td className="px-4 py-3 whitespace-nowrap font-semibold text-green-600">{player.last4PPG}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* Draft Board Tab */}
            {activeTab === 'draft' && (
              <div className="space-y-6">
                {/* Draft Status */}
                <div className="bg-gradient-to-r from-[#6CC24A] to-[#009CDE] text-white rounded-lg shadow-lg p-6">
                  <div className="text-center">
                    <div className="text-sm opacity-90">Round {currentRound} - Pick {currentPick}</div>
                    <div className="text-3xl font-bold mt-2">{currentTeamOnClock || 'Draft Complete!'}</div>
                    <div className="text-sm opacity-90 mt-1">ON THE CLOCK</div>
                  </div>
                </div>

                {/* Available Players */}
                <div className="bg-white rounded-lg shadow">
                  <div className="p-4 border-b">
                    <h3 className="text-lg font-bold">Available Players</h3>
                    <p className="text-sm text-gray-600 mt-1">Click a player to draft them to {currentTeamOnClock}</p>
                  </div>
                  
                  <div className="p-4">
                    <input
                      type="text"
                      placeholder="Search available players..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#009CDE] focus:border-transparent mb-4"
                    />
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 max-h-96 overflow-y-auto">
                      {sortedPlayers.slice(0, 30).map((player) => (
                        <button
                          key={player.id}
                          onClick={() => handleDraft(player)}
                          className="text-left p-3 border-2 rounded-lg hover:border-[#009CDE] hover:bg-[#009CDE]/10 transition-all"
                        >
                          <div className="font-bold text-gray-900">{player.name}</div>
                          <div className="text-sm text-gray-600">{player.school} - {player.position}</div>
                          <div className="text-sm text-gray-500 mt-1">
                            {player.seed} {player.region} • {player.last4PPG} PPG
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Team Rosters */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {teams.map((team) => {
                    const roster = getTeamRoster(team);
                    return (
                      <div key={team} className="bg-white rounded-lg shadow">
                        <div className="p-4 bg-gray-50 border-b">
                          <h3 className="font-bold text-gray-900">{team}</h3>
                          <div className="text-sm text-gray-600">{roster.length}/12 players</div>
                        </div>
                        <div className="p-4">
                          {roster.length === 0 ? (
                            <p className="text-gray-400 text-sm">No players drafted yet</p>
                          ) : (
                            <div className="space-y-2">
                              {roster.map((player, idx) => (
                                <div key={player.id} className="flex justify-between items-center text-sm">
                                  <div>
                                    <span className="text-gray-500 mr-2">{idx + 1}.</span>
                                    <span className="font-medium">{player.name}</span>
                                    <span className="text-gray-500 ml-2">({player.school})</span>
                                  </div>
                                  <span className="text-gray-600">{player.last4PPG} PPG</span>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Live Scoring Tab */}
            {activeTab === 'live' && (
              <div className="space-y-6">
                {/* Update Info */}
                <div className="bg-white rounded-lg shadow p-4 flex justify-between items-center">
                  <div>
                    <div className="text-sm text-gray-600">Last Updated</div>
                    <div className="font-medium">{lastUpdate.toLocaleTimeString()}</div>
                  </div>
                  <button
                    onClick={manualRefresh}
                    className="px-4 py-2 bg-[#009CDE] text-white rounded-lg hover:bg-[#0077C8] transition-colors"
                  >
                    Refresh Now
                  </button>
                </div>

                {/* Standings */}
                <div className="bg-white rounded-lg shadow">
                  <div className="p-4 border-b">
                    <h2 className="text-xl font-bold">Potter Cup Standings</h2>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full">
                      <thead className="bg-gray-50">
                        <tr>
                          <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase">Rank</th>
                          <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase">Team</th>
                          <th className="px-4 py-3 text-right text-xs font-medium text-gray-700 uppercase">Total Points</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-200">
                        {standings.map((team, idx) => (
                          <tr key={team.team} className={idx === 0 ? 'bg-yellow-50' : 'hover:bg-gray-50'}>
                            <td className="px-4 py-3">
                              <span className={`text-lg font-bold ${idx === 0 ? 'text-yellow-600' : 'text-gray-600'}`}>
                                {idx + 1}
                                {idx === 0 && ' 🏆'}
                              </span>
                            </td>
                            <td className="px-4 py-3 font-medium text-gray-900">{team.team}</td>
                            <td className="px-4 py-3 text-right">
                              <span className="text-2xl font-bold text-[#009CDE]">{team.total}</span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Detailed Team Breakdowns */}
                <div className="grid grid-cols-1 gap-4">
                  {standings.map((team) => {
                    const roster = getTeamRoster(team.team);
                    return (
                      <div key={team.team} className="bg-white rounded-lg shadow">
                        <div className="p-4 bg-gray-50 border-b">
                          <div className="flex justify-between items-center">
                            <h3 className="font-bold text-gray-900">{team.team}</h3>
                            <span className="text-2xl font-bold text-[#009CDE]">{team.total} pts</span>
                          </div>
                        </div>
                        <div className="p-4">
                          <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                              <thead className="bg-gray-50">
                                <tr>
                                  <th className="px-3 py-2 text-left text-xs font-medium text-gray-600">Player</th>
                                  <th className="px-3 py-2 text-left text-xs font-medium text-gray-600">School</th>
                                  <th className="px-3 py-2 text-right text-xs font-medium text-gray-600">R64</th>
                                  <th className="px-3 py-2 text-right text-xs font-medium text-gray-600">R32</th>
                                  <th className="px-3 py-2 text-right text-xs font-medium text-gray-600">S16</th>
                                  <th className="px-3 py-2 text-right text-xs font-medium text-gray-600">E8</th>
                                  <th className="px-3 py-2 text-right text-xs font-medium text-gray-600">F4</th>
                                  <th className="px-3 py-2 text-right text-xs font-medium text-gray-600">Final</th>
                                  <th className="px-3 py-2 text-right text-xs font-medium text-gray-600">Total</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-gray-200">
                                {roster.map((player) => {
                                  // Mock round scores for demo
                                  const r64 = Math.floor(Math.random() * 25);
                                  const r32 = Math.random() > 0.5 ? Math.floor(Math.random() * 25) : 0;
                                  const s16 = Math.random() > 0.7 ? Math.floor(Math.random() * 25) : 0;
                                  const e8 = 0;
                                  const f4 = 0;
                                  const finals = 0;
                                  const playerTotal = r64 + r32 + s16 + e8 + f4 + finals;
                                  
                                  return (
                                    <tr key={player.id} className="hover:bg-gray-50">
                                      <td className="px-3 py-2 font-medium">{player.name}</td>
                                      <td className="px-3 py-2 text-gray-600">{player.school}</td>
                                      <td className="px-3 py-2 text-right">{r64 || '-'}</td>
                                      <td className="px-3 py-2 text-right">{r32 || '-'}</td>
                                      <td className="px-3 py-2 text-right">{s16 || '-'}</td>
                                      <td className="px-3 py-2 text-right">{e8 || '-'}</td>
                                      <td className="px-3 py-2 text-right">{f4 || '-'}</td>
                                      <td className="px-3 py-2 text-right">{finals || '-'}</td>
                                      <td className="px-3 py-2 text-right font-bold">{playerTotal}</td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="bg-white border-t mt-12 py-6">
            <div className="max-w-7xl mx-auto px-4 text-center text-gray-600 text-sm">
              <p>Potter Cup • NCAA Tournament Draft Tracker</p>
              <p className="mt-1">Test data with current 2025-26 D1 players - Ready for March 2026 tournament!</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<PotterCup />, document.getElementById('root'));
  </script>
</body>
</html>
