    const TEAM_NAMES = ["Trey & Duck", "Will & Bill", "The Syndicate", "Stoeckle Brothers", "Fahrion Brothers", "Phil & AJ", "Tanner & Milldo", "Greg & Thomps", "Fish & EJ", "Clif & Jay L.", "Fahey & Page"];

    const TOTAL_ROUNDS = 12;

    function PotterCup() {
      const [players] = useState(PLAYERS_DATA);
      const [teams] = useState(TEAM_NAMES);
      const [draftedPlayers, setDraftedPlayers] = useState(() => {
        try {
          const saved = localStorage.getItem('potterCupDraftState');
          return saved ? JSON.parse(saved) : {};
        } catch (e) {
          return {};
        }
      });
      const [disabledPlayers, setDisabledPlayers] = useState(() => {
        try {
          const saved = localStorage.getItem('potterCupDisabledPlayers');
          return saved ? new Set(JSON.parse(saved)) : new Set();
        } catch (e) {
          return new Set();
        }
      });
      const [currentPick, setCurrentPick] = useState(() => {
        try {
          const saved = localStorage.getItem('potterCupCurrentPick');
          return saved ? parseInt(saved) : 1;
        } catch (e) {
          return 1;
        }
      });
      const [sortConfig, setSortConfig] = useState({ key: 'seasonPPG', direction: 'desc' });
      const [searchTerm, setSearchTerm] = useState('');
      const [schoolFilter, setSchoolFilter] = useState('ALL');
      const [confFilter, setConfFilter] = useState('ALL');
      const [regionFilter, setRegionFilter] = useState('ALL');
      const [adminMode, setAdminMode] = useState(false);
      const [showPasswordPrompt, setShowPasswordPrompt] = useState(false);

      const getDraftOrder = () => {
        const order = [];
        for (let round = 0; round < TOTAL_ROUNDS; round++) {
          let baseOrder = teams.map((_, idx) => idx);
          
          if (round % 2 === 1) {
            baseOrder = [...baseOrder].reverse();
          }
          
          if (round % 2 === 1) {
            order.push(...baseOrder);
          } else {
            order.push(...[...baseOrder].reverse());
          }
        }
        
        return order;
      };

      const draftOrder = getDraftOrder();
      const currentRound = Math.ceil(currentPick / teams.length);
      const currentTeamIndex = draftOrder[currentPick - 1];
      const currentTeam = teams[currentTeamIndex];
      const totalPicks = teams.length * TOTAL_ROUNDS;
      const isDraftComplete = currentPick > totalPicks;

      const upcomingPicks = useMemo(() => {
        const picks = [];
        for (let i = currentPick; i <= Math.min(currentPick + 20, totalPicks); i++) {
          const round = Math.ceil(i / teams.length);
          const teamIdx = draftOrder[i - 1];
          picks.push({
            pickNumber: i,
            round: round,
            team: teams[teamIdx],
            teamIndex: teamIdx
          });
        }
        return picks;
      }, [currentPick, teams, draftOrder]);

      const uniqueSchools = useMemo(() => {
        return [...new Set(players.map(p => p.school))].sort();
      }, [players]);

      const uniqueConferences = useMemo(() => {
        return [...new Set(players.map(p => p.conf))].sort();
      }, [players]);

      const uniqueRegions = useMemo(() => {
        return [...new Set(players.map(p => p.region).filter(Boolean))].sort();
      }, [players]);

      const availablePlayers = useMemo(() => {
        let filtered = players.filter(p => !draftedPlayers[p.id] && !disabledPlayers.has(p.id));
        
        if (searchTerm) {
          filtered = filtered.filter(p => 
            p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
            p.school.toLowerCase().includes(searchTerm.toLowerCase())
          );
        }
        
        if (schoolFilter !== 'ALL') {
          filtered = filtered.filter(p => p.school === schoolFilter);
        }

        if (confFilter !== 'ALL') {
          filtered = filtered.filter(p => p.conf === confFilter);
        }

        if (regionFilter !== 'ALL') {
          filtered = filtered.filter(p => p.region === regionFilter);
        }
        
        return filtered.sort((a, b) => {
          const key = sortConfig.key;
          const direction = sortConfig.direction;
          
          let aVal = a[key];
          let bVal = b[key];
          
          if (key === 'seasonPPG' || key === 'seed') {
            aVal = (typeof aVal === 'number') ? aVal : (aVal ? parseFloat(aVal) : 999);
            bVal = (typeof bVal === 'number') ? bVal : (bVal ? parseFloat(bVal) : 999);
            return direction === 'desc' ? bVal - aVal : aVal - bVal;
          }
          
          aVal = String(aVal || '').toLowerCase();
          bVal = String(bVal || '').toLowerCase();
          
          if (aVal < bVal) return direction === 'desc' ? 1 : -1;
          if (aVal > bVal) return direction === 'desc' ? -1 : 1;
          return 0;
        });
      }, [players, draftedPlayers, disabledPlayers, sortConfig, searchTerm, schoolFilter, confFilter, regionFilter]);

      const handleSort = (key) => {
        setSortConfig(prev => ({
          key,
          direction: prev.key === key && prev.direction === 'desc' ? 'asc' : 'desc'
        }));
      };

      const handleAdminToggle = () => {
        if (!adminMode) {
          setShowPasswordPrompt(true);
        } else {
          setAdminMode(false);
        }
      };

      const handlePasswordSubmit = (e) => {
        e.preventDefault();
        const password = e.target.password.value;
        if (password === '2121') {
          setAdminMode(true);
          setShowPasswordPrompt(false);
        } else {
          alert('Incorrect password!');
        }
        e.target.password.value = '';
      };

      const handleDraft = (player) => {
        if (isDraftComplete || disabledPlayers.has(player.id)) return;
        
        const newDrafted = {
          ...draftedPlayers,
          [player.id]: currentTeam
        };
        
        setDraftedPlayers(newDrafted);
        const newPick = currentPick + 1;
        setCurrentPick(newPick);
        
        try {
          localStorage.setItem('potterCupDraftState', JSON.stringify(newDrafted));
          localStorage.setItem('potterCupCurrentPick', newPick.toString());
          const draftedPlayerIds = Object.keys(newDrafted).map(id => parseInt(id));
          localStorage.setItem('potterCupDrafts', JSON.stringify(
            draftedPlayerIds.map(id => ({ playerId: id }))
          ));
        } catch (e) {
          console.error('Failed to save draft state:', e);
        }
      };

      const handleUndraft = (playerId) => {
        const newDrafted = { ...draftedPlayers };
        delete newDrafted[playerId];
        
        setDraftedPlayers(newDrafted);
        
        if (currentPick > 1) {
          const newPick = currentPick - 1;
          setCurrentPick(newPick);
          
          try {
            localStorage.setItem('potterCupDraftState', JSON.stringify(newDrafted));
            localStorage.setItem('potterCupCurrentPick', newPick.toString());
            const draftedPlayerIds = Object.keys(newDrafted).map(id => parseInt(id));
            localStorage.setItem('potterCupDrafts', JSON.stringify(
              draftedPlayerIds.map(id => ({ playerId: id }))
            ));
          } catch (e) {
            console.error('Failed to save draft state:', e);
          }
        }
      };

      const handleToggleDisabled = (playerId) => {
        const newDisabled = new Set(disabledPlayers);
        if (newDisabled.has(playerId)) {
          newDisabled.delete(playerId);
        } else {
          newDisabled.add(playerId);
        }
        setDisabledPlayers(newDisabled);
        
        try {
          localStorage.setItem('potterCupDisabledPlayers', JSON.stringify([...newDisabled]));
        } catch (e) {
          console.error('Failed to save disabled players:', e);
        }
      };

      const handleResetDraft = () => {
        if (confirm('Are you sure you want to reset the entire draft? This cannot be undone.')) {
          setDraftedPlayers({});
          setCurrentPick(1);
          try {
            localStorage.removeItem('potterCupDraftState');
            localStorage.removeItem('potterCupCurrentPick');
            localStorage.removeItem('potterCupDrafts');
          } catch (e) {
            console.error('Failed to clear draft state:', e);
          }
        }
      };

      const handleEnableAll = () => {
        setDisabledPlayers(new Set());
        try {
          localStorage.removeItem('potterCupDisabledPlayers');
        } catch (e) {
          console.error('Failed to clear disabled players:', e);
        }
      };

      const getTeamRoster = (team) => {
        return Object.entries(draftedPlayers)
          .filter(([_, draftedTeam]) => draftedTeam === team)
          .map(([playerId, _]) => players.find(p => p.id === parseInt(playerId)))
          .filter(Boolean);
      };

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col">
          <header className="bg-gradient-to-r from-[#009CDE] to-[#0077C8] text-white shadow-lg">
            <div className="max-w-full mx-auto px-4 py-4 flex justify-between items-center">
              <div>
                <h1 className="text-2xl md:text-3xl font-bold">🏆 The Potter Cup</h1>
                <p className="text-[#E6F7FF] mt-1 text-sm">2026 NCAA Tournament Draft • 68 Teams • 2268 Players</p>
              </div>
              <div className="flex gap-3 items-center">
                <button
                  onClick={handleAdminToggle}
                  className={"px-4 py-2 rounded-lg font-semibold transition-colors " + (adminMode ? "bg-yellow-400 text-gray-900" : "bg-white/20 text-white hover:bg-white/30")}
                >
                  {adminMode ? "🔓 Admin Mode" : "🔒 Admin Login"}
                </button>
                <a 
                  href="standings.html" 
                  target="_blank"
                  className="bg-white text-[#009CDE] px-4 py-2 rounded-lg font-semibold hover:bg-[#E6F7FF] transition-colors"
                >
                  📈 Live Standings
                </a>
                <a 
                  href="bracket.html" 
                  target="_blank"
                  className="bg-white text-[#009CDE] px-4 py-2 rounded-lg font-semibold hover:bg-[#E6F7FF] transition-colors"
                >
                  📊 View 2026 Bracket
                </a>
              </div>
            </div>
          </header>

          {showPasswordPrompt && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
              <div className="bg-white rounded-lg p-6 max-w-sm w-full">
                <h3 className="text-lg font-bold mb-4">Admin Password Required</h3>
                <form onSubmit={handlePasswordSubmit}>
                  <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    className="w-full px-3 py-2 border rounded mb-4"
                    autoFocus
                  />
                  <div className="flex gap-2">
                    <button
                      type="submit"
                      className="flex-1 bg-[#009CDE] text-white px-4 py-2 rounded hover:bg-[#0077C8]"
                    >
                      Login
                    </button>
                    <button
                      type="button"
                      onClick={() => setShowPasswordPrompt(false)}
                      className="flex-1 bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400"
                    >
                      Cancel
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className="flex-1 flex overflow-hidden">
            <div className="w-64 bg-white border-r overflow-y-auto">
              <div className="p-4 border-b bg-gray-50 sticky top-0 z-10">
                <h2 className="font-bold text-gray-900 mb-2">Upcoming Picks</h2>
                <div className="text-xs text-gray-600">
                  Round {currentRound} of {TOTAL_ROUNDS}
                </div>
                <div className="text-xs text-gray-600">
                  Pick {currentPick} of {totalPicks}
                </div>
              </div>

              <div className="p-3">
                {upcomingPicks.map((pick, idx) => {
                  const isCurrentPick = pick.pickNumber === currentPick;
                  const roundLabel = pick.pickNumber === 1 || (pick.pickNumber - 1) % teams.length === 0 
                    ? `Round ${pick.round}` 
                    : null;
                  
                  return (
                    <div key={pick.pickNumber}>
                      {roundLabel && (
                        <div className="text-xs font-bold text-gray-500 uppercase mt-3 mb-1 px-2">
                          {roundLabel}
                        </div>
                      )}
                      <div
                        className={`mb-2 p-2 rounded text-sm ${
                          isCurrentPick ? 'bg-green-100 border-2 border-green-500 font-bold' :
                          'bg-gray-50 hover:bg-gray-100'
                        }`}
                      >
                        <div className="text-xs text-gray-600">Pick {pick.pickNumber}</div>
                        <div className="truncate">{pick.team}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="flex-1 flex flex-col overflow-hidden">
              <div className="p-4 border-b bg-white">
                <div className="grid grid-cols-4 gap-3 mb-3">
                  <input
                    type="text"
                    placeholder="Search players or schools..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-[#009CDE] focus:border-transparent"
                  />
                  <select
                    value={regionFilter}
                    onChange={(e) => setRegionFilter(e.target.value)}
                    className="px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-[#009CDE] focus:border-transparent"
                  >
                    <option value="ALL">All Regions</option>
                    {uniqueRegions.map(region => (
                      <option key={region} value={region}>{region}</option>
                    ))}
                  </select>
                  <select
                    value={confFilter}
                    onChange={(e) => setConfFilter(e.target.value)}
                    className="px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-[#009CDE] focus:border-transparent"
                  >
                    <option value="ALL">All Conferences</option>
                    {uniqueConferences.map(conf => (
                      <option key={conf} value={conf}>{conf}</option>
                    ))}
                  </select>
                  <select
                    value={schoolFilter}
                    onChange={(e) => setSchoolFilter(e.target.value)}
                    className="px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-[#009CDE] focus:border-transparent"
                  >
                    <option value="ALL">All Schools</option>
                    {uniqueSchools.map(school => (
                      <option key={school} value={school}>{school}</option>
                    ))}
                  </select>
                </div>

                <div className="flex justify-between items-center">
                  <div className="text-xs text-gray-600">
                    {availablePlayers.length} available {adminMode ? `• ${disabledPlayers.size} disabled` : ''}
                  </div>
                  {adminMode && (
                    <button
                      onClick={handleEnableAll}
                      className="text-xs px-3 py-1 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded"
                    >
                      Enable All Players
                    </button>
                  )}
                </div>
              </div>

              <div className="overflow-x-auto flex-1">
                <table className="w-full">
                  <thead className="bg-gray-50 sticky top-0">
                    <tr>
                      {adminMode && (
                        <th className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase">
                          Status
                        </th>
                      )}
                      <th 
                        onClick={() => handleSort('name')}
                        className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100"
                      >
                        Player {sortConfig.key === 'name' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('school')}
                        className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100"
                      >
                        School {sortConfig.key === 'school' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('position')}
                        className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100"
                      >
                        Position {sortConfig.key === 'position' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('conf')}
                        className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100"
                      >
                        Conf {sortConfig.key === 'conf' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('year')}
                        className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100"
                      >
                        Year {sortConfig.key === 'year' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('seasonPPG')}
                        className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100"
                      >
                        PPG {sortConfig.key === 'seasonPPG' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('seed')}
                        className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100"
                      >
                        Seed {sortConfig.key === 'seed' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('region')}
                        className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100"
                      >
                        Region {sortConfig.key === 'region' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      <th 
                        onClick={() => handleSort('opponent')}
                        className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100"
                      >
                        R1 Opponent {sortConfig.key === 'opponent' && (sortConfig.direction === 'desc' ? '↓' : '↑')}
                      </th>
                      {adminMode && (
                        <th className="px-3 py-3 text-left text-xs font-medium text-gray-700 uppercase">
                          Action
                        </th>
                      )}
                    </tr>
                  </thead>
                  <tbody>
                    {availablePlayers.map((player) => (
                      <tr 
                        key={player.id} 
                        className={"hover:bg-blue-50 " + (disabledPlayers.has(player.id) ? "bg-red-50 opacity-50" : "")}
                      >
                        {adminMode && (
                          <td className="px-3 py-2">
                            <button
                              onClick={() => handleToggleDisabled(player.id)}
                              className={`text-xs px-2 py-1 rounded ${
                                disabledPlayers.has(player.id) 
                                  ? "bg-red-100 text-red-700 hover:bg-red-200" 
                                  : "bg-green-100 text-green-700 hover:bg-green-200"
                              }`}
                            >
                              {disabledPlayers.has(player.id) ? "🚫 Disabled" : "✅ Enabled"}
                            </button>
                          </td>
                        )}
                        <td className="px-3 py-2 font-medium text-gray-900">
                          {player.name}
                          {player.injuryStatus && (
                            <span 
                              className="ml-1 text-yellow-500 cursor-help" 
                              title={player.injuryStatus}
                            >
                              ⚡
                            </span>
                          )}
                        </td>
                        <td className="px-3 py-2 text-sm text-gray-600">{player.school}</td>
                        <td className="px-3 py-2 text-sm text-gray-600">{player.position}</td>
                        <td className="px-3 py-2 text-sm text-gray-600">{player.conf}</td>
                        <td className="px-3 py-2 text-sm text-gray-600">{player.year}</td>
                        <td className="px-3 py-2 font-bold text-[#009CDE]">{player.seasonPPG}</td>
                        <td className="px-3 py-2 text-sm font-semibold text-gray-900">{player.seed || '—'}</td>
                        <td className="px-3 py-2 text-sm font-semibold text-gray-900">{player.region}</td>
                        <td className="px-3 py-2 text-sm text-gray-600">{player.opponent}</td>
                        {adminMode && (
                          <td className="px-3 py-2">
                            <button
                              onClick={() => handleDraft(player)}
                              disabled={isDraftComplete || disabledPlayers.has(player.id)}
                              className="px-3 py-1 bg-[#009CDE] text-white text-sm rounded hover:bg-[#0077C8] disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors"
                            >
                              Draft
                            </button>
                          </td>
                        )}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="w-80 bg-white border-l overflow-y-auto">
              <div className="p-4 border-b bg-gray-50">
                <div className="flex justify-between items-center mb-2">
                  <h2 className="font-bold text-gray-900">Team Rosters</h2>
                  {adminMode && (
                    <button
                      onClick={handleResetDraft}
                      className="text-xs px-2 py-1 bg-red-100 text-red-700 hover:bg-red-200 rounded transition-colors"
                      title="Reset entire draft"
                    >
                      Reset Draft
                    </button>
                  )}
                </div>
                {adminMode && <p className="text-xs text-gray-600">Click ❌ to undo a pick</p>}
              </div>

              <div className="divide-y">
                {teams.map((team) => {
                  const roster = getTeamRoster(team);
                  return (
                    <div key={team} className="p-3">
                      <div className="flex justify-between items-start mb-2">
                        <h3 className="font-semibold text-sm text-gray-900 line-clamp-2">
                          {team}
                        </h3>
                        <span className="text-xs text-gray-500 whitespace-nowrap ml-2">
                          {roster.length}/{TOTAL_ROUNDS}
                        </span>
                      </div>
                      {roster.length === 0 ? (
                        <p className="text-xs text-gray-400 italic">No picks yet</p>
                      ) : (
                        <div className="space-y-1">
                          {roster.map((player, idx) => (
                            <div key={player.id} className="text-xs flex items-center justify-between group hover:bg-gray-50 px-1 py-0.5 rounded">
                              <div>
                                <span className="text-gray-500">{idx + 1}.</span>
                                {' '}
                                <span className="font-medium">{player.name}</span>
                                {player.injuryStatus && <span className="text-yellow-500">⚡</span>}
                                {' '}
                                <span className="text-gray-500">({player.seasonPPG})</span>
                              </div>
                              {adminMode && (
                                <button
                                  onClick={() => handleUndraft(player.id)}
                                  className="opacity-0 group-hover:opacity-100 text-red-600 hover:text-red-800 transition-opacity ml-2"
                                  title="Undo this pick"
                                >
                                  ❌
                                </button>
                              )}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<PotterCup />, document.getElementById('root'));
  </script>
</body>
</html>
