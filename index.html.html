<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 NCAA Tournament Bracket | Potter Cup</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; background: white; }
    .r1-connector { position: relative; }
    .r1-connector::after {
      content: '';
      position: absolute;
      right: -16px;
      top: 50%;
      width: 16px;
      height: 2px;
      background: #333;
    }
    .pair-line {
      position: absolute;
      right: -16px;
      width: 2px;
      background: #333;
    }
    .round-spacer { width: 32px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const BRACKET_DATA = {"East": [{"seed": "1", "team": "Duke"}, {"seed": "16", "team": "Siena"}, {"seed": "8", "team": "Ohio St."}, {"seed": "9", "team": "TCU"}, {"seed": "5", "team": "St. John's"}, {"seed": "12", "team": "Northern Iowa"}, {"seed": "4", "team": "Kansas"}, {"seed": "13", "team": "Cal Baptist"}, {"seed": "6", "team": "Louisville"}, {"seed": "11", "team": "South Florida"}, {"seed": "3", "team": "Michigan St."}, {"seed": "14", "team": "North Dakota St."}, {"seed": "7", "team": "UCLA"}, {"seed": "10", "team": "UCF"}, {"seed": "2", "team": "Connecticut"}, {"seed": "15", "team": "Furman"}], "West": [{"seed": "1", "team": "Arizona"}, {"seed": "16", "team": "LIU"}, {"seed": "8", "team": "Villanova"}, {"seed": "9", "team": "Utah St."}, {"seed": "5", "team": "Wisconsin"}, {"seed": "12", "team": "High Point"}, {"seed": "4", "team": "Arkansas"}, {"seed": "13", "team": "Hawaii"}, {"seed": "6", "team": "BYU"}, {"seed": "11", "team": "Texas"}, {"seed": "3", "team": "Gonzaga"}, {"seed": "14", "team": "Kennesaw St."}, {"seed": "7", "team": "Miami FL"}, {"seed": "10", "team": "Missouri"}, {"seed": "2", "team": "Purdue"}, {"seed": "15", "team": "Queens"}], "South": [{"seed": "1", "team": "Florida"}, {"seed": "16", "team": "Prairie View A&M"}, {"seed": "16", "team": "Lehigh"}, {"seed": "8", "team": "Clemson"}, {"seed": "9", "team": "Iowa"}, {"seed": "5", "team": "Vanderbilt"}, {"seed": "12", "team": "McNeese St."}, {"seed": "4", "team": "Nebraska"}, {"seed": "13", "team": "Troy"}, {"seed": "6", "team": "North Carolina"}, {"seed": "11", "team": "VCU"}, {"seed": "3", "team": "Illinois"}, {"seed": "14", "team": "Penn"}, {"seed": "7", "team": "Saint Mary's"}, {"seed": "10", "team": "Texas A&M"}, {"seed": "2", "team": "Houston"}, {"seed": "15", "team": "Idaho"}], "Midwest": [{"seed": "1", "team": "Michigan"}, {"seed": "16", "team": "Howard"}, {"seed": "8", "team": "Georgia"}, {"seed": "9", "team": "Saint Louis"}, {"seed": "5", "team": "Texas Tech"}, {"seed": "12", "team": "Akron"}, {"seed": "4", "team": "Alabama"}, {"seed": "13", "team": "Hofstra"}, {"seed": "6", "team": "Tennessee"}, {"seed": "11", "team": "Miami OH"}, {"seed": "11", "team": "SMU"}, {"seed": "3", "team": "Virginia"}, {"seed": "14", "team": "Wright St."}, {"seed": "7", "team": "Kentucky"}, {"seed": "10", "team": "Santa Clara"}, {"seed": "2", "team": "Iowa St."}, {"seed": "15", "team": "Tennessee St."}]};

    function TeamModal({ team, onClose }) {
      const [teamPlayers, setTeamPlayers] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const players = PLAYERS_DATA.filter(p => p.school === team);
        setTeamPlayers(players.sort((a, b) => b.seasonPPG - a.seasonPPG));
        setLoading(false);
      }, [team]);

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={onClose}>
          <div className="bg-white rounded-lg max-w-3xl w-full max-h-[80vh] overflow-hidden" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b bg-gray-50 flex justify-between items-center">
              <h2 className="text-2xl font-bold text-gray-900">{team}</h2>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-3xl leading-none">×</button>
            </div>
            <div className="overflow-auto p-6">
              {loading ? (
                <div className="text-center py-12"><div className="inline-block animate-spin rounded-full h-8 w-8 border-4 border-[#009CDE] border-t-transparent"></div></div>
              ) : teamPlayers.length === 0 ? (
                <p className="text-gray-500 text-center py-12">No players found for this team.</p>
              ) : (
                <table className="w-full">
                  <thead className="bg-gray-50">
                    <tr>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase">Player</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase">Position</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase">Year</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase">PPG</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-200">
                    {teamPlayers.map((player) => (
                      <tr key={player.id} className="hover:bg-blue-50">
                        <td className="px-4 py-3 font-medium text-gray-900">{player.name}</td>
                        <td className="px-4 py-3 text-sm text-gray-600">{player.position}</td>
                        <td className="px-4 py-3 text-sm text-gray-600">{player.year}</td>
                        <td className="px-4 py-3 font-bold text-[#009CDE]">{player.seasonPPG}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      );
    }

    function TeamSlot({ team, seed, onClick }) {
      const displayTeam = team || "";
      const isPlayIn = displayTeam.includes(' or ');
      return (
        <div className={"flex items-center border-2 border-gray-800 bg-white h-7 cursor-pointer hover:bg-gray-50 transition-colors" + (isPlayIn ? " italic text-blue-600" : "")}
          onClick={() => { if (team && !isPlayIn) onClick(team); }}>
          <div className="w-7 bg-gray-800 text-white text-center text-xs font-bold h-full flex items-center justify-center flex-shrink-0">{seed || "—"}</div>
          <div className="flex-1 px-2 text-xs font-semibold truncate min-w-0">{displayTeam}</div>
        </div>
      );
    }

    function RegionBracket({ teams, title, onTeamClick, reverse = false }) {
      const pairs = [];
      for (let i = 0; i < teams.length; i += 2) pairs.push([teams[i], teams[i + 1]]);
      const r2Teams = [0, 2, 4, 6].map(i => ({}));
      const r3Teams = [0, 2].map(i => ({}));
      const r4Team = {};
      return (
        <div>
          <div className="text-center mb-4">
            <h2 className="text-2xl font-black text-gray-800 bg-gray-200 py-2 px-4 inline-block rounded">{title}</h2>
          </div>
          <div className={"flex gap-0 " + (reverse ? "flex-row-reverse" : "")}>
            <div className="flex flex-col justify-around">
              {pairs.map((pair, idx) => (
                <div key={idx} className="game-pair mb-8">
                  <div className="r1-connector"><TeamSlot team={pair[0].team} seed={pair[0].seed} onClick={onTeamClick} /></div>
                  <div className="r1-connector mt-0.5"><TeamSlot team={pair[1].team} seed={pair[1].seed} onClick={onTeamClick} /></div>
                  <div className="pair-line" style={{ top: '15px', height: '32px' }}></div>
                </div>
              ))}
            </div>
            <div className="round-spacer"></div>
            <div className="flex flex-col justify-around">
              {r2Teams.map((team, idx) => (
                <div key={idx} className="r1-connector" style={{ marginBottom: idx < 3 ? '100px' : '0' }}>
                  <TeamSlot team={team.team} seed={team.seed} onClick={onTeamClick} />
                </div>
              ))}
            </div>
            <div className="round-spacer"></div>
            <div className="flex flex-col justify-around">
              {r3Teams.map((team, idx) => (
                <div key={idx} className="r1-connector" style={{ marginBottom: idx < 1 ? '232px' : '0' }}>
                  <TeamSlot team={team.team} seed={team.seed} onClick={onTeamClick} />
                </div>
              ))}
            </div>
            <div className="round-spacer"></div>
            <div className="flex flex-col justify-center">
              <div className="r1-connector"><TeamSlot team={r4Team.team} seed={r4Team.seed} onClick={onTeamClick} /></div>
            </div>
          </div>
        </div>
      );
    }

    function Bracket() {
      const [selectedTeam, setSelectedTeam] = useState(null);
      const [draftedPlayers, setDraftedPlayers] = useState(new Set());

      useEffect(() => {
        const syncDrafts = () => {
          try {
            const drafts = JSON.parse(localStorage.getItem('potterCupDrafts') || '[]');
            setDraftedPlayers(new Set(drafts.map(d => d.playerId)));
          } catch (e) {}
        };
        syncDrafts();
        const interval = setInterval(syncDrafts, 1000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="min-h-screen bg-white">
          <div className="bg-gradient-to-r from-red-600 via-blue-800 to-red-600 text-white py-3 px-6">
            <div className="text-center">
              <h1 className="text-2xl font-black tracking-tight">2026 NCAA DIVISION I MEN'S BASKETBALL CHAMPIONSHIP</h1>
            </div>
          </div>
          <div className="bg-gray-100 border-b-2 border-gray-300 py-2 px-6">
            <div className="flex justify-between text-[10px] font-bold text-gray-700 max-w-[1800px] mx-auto">
              <div className="flex gap-8">
                <span className="w-20">FIRST ROUND<br/>MARCH 18-20</span>
                <span className="w-20">SECOND ROUND<br/>MARCH 21-22</span>
                <span className="w-20">SWEET 16<br/>MARCH 26-27</span>
                <span className="w-20">ELITE 8<br/>MARCH 28-29</span>
              </div>
              <div className="text-center"><span>NATIONAL SEMIFINALS • APRIL 4</span></div>
              <div className="flex gap-8">
                <span className="w-20 text-right">ELITE 8<br/>MARCH 28-29</span>
                <span className="w-20 text-right">SWEET 16<br/>MARCH 26-27</span>
                <span className="w-20 text-right">SECOND ROUND<br/>MARCH 21-22</span>
                <span className="w-20 text-right">FIRST ROUND<br/>MARCH 18-20</span>
              </div>
            </div>
          </div>
          <div className="bg-blue-900 text-white py-2 text-center">
            <div className="flex justify-center items-center gap-8 text-sm font-bold">
              <div className="text-xs">FIRST FOUR • DAYTON • MARCH 17-18</div>
            </div>
          </div>
          <div className="p-8 overflow-x-auto">
            <div className="min-w-[1600px] max-w-[1800px] mx-auto">
              <div className="flex justify-between items-start mb-16">
                <RegionBracket teams={BRACKET_DATA.East} title="EAST REGION" onTeamClick={setSelectedTeam} />
                <RegionBracket teams={BRACKET_DATA.West} title="WEST REGION" onTeamClick={setSelectedTeam} reverse={true} />
              </div>
              <div className="relative flex justify-center items-center my-20">
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className="text-center">
                    <svg className="w-48 h-48 mx-auto mb-4" viewBox="0 0 200 200">
                      <circle cx="100" cy="100" r="90" fill="#003366" stroke="#CC0000" strokeWidth="8"/>
                      <text x="100" y="80" textAnchor="middle" fill="white" fontSize="32" fontWeight="bold">FINAL</text>
                      <text x="100" y="115" textAnchor="middle" fill="white" fontSize="32" fontWeight="bold">FOUR</text>
                      <text x="100" y="140" textAnchor="middle" fill="#FFD700" fontSize="16" fontWeight="bold">INDIANAPOLIS</text>
                      <text x="100" y="160" textAnchor="middle" fill="#FFD700" fontSize="14">APRIL 4-6</text>
                    </svg>
                    <div className="mt-6 space-y-2">
                      <div className="flex gap-12 justify-center">
                        <TeamSlot team="" seed="" onClick={setSelectedTeam} />
                        <TeamSlot team="" seed="" onClick={setSelectedTeam} />
                      </div>
                      <div className="text-xs font-bold text-gray-600">NATIONAL CHAMPIONSHIP • APRIL 6</div>
                      <div className="flex justify-center"><TeamSlot team="" seed="" onClick={setSelectedTeam} /></div>
                    </div>
                  </div>
                </div>
              </div>
              <div className="flex justify-between items-start mt-16">
                <RegionBracket teams={BRACKET_DATA.South} title="SOUTH REGION" onTeamClick={setSelectedTeam} />
                <RegionBracket teams={BRACKET_DATA.Midwest} title="MIDWEST REGION" onTeamClick={setSelectedTeam} reverse={true} />
              </div>
            </div>
          </div>
          {selectedTeam && <TeamModal team={selectedTeam} onClose={() => setSelectedTeam(null)} />}
        </div>
      );
    }

    const PLAYERS_DATA = [];
    ReactDOM.render(<Bracket />, document.getElementById('root'));
  </script>
</body>
</html>
