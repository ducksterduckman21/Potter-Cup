<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 NCAA Tournament Bracket | Potter Cup</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; background: white; }
    .r1-connector { position: relative; }
    .r1-connector::after {
      content: '';
      position: absolute;
      right: -16px;
      top: 50%;
      width: 16px;
      height: 2px;
      background: #333;
    }
    .pair-line {
      position: absolute;
      right: -16px;
      width: 2px;
      background: #333;
    }
    .round-spacer { width: 32px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const PLAYERS_DATA = [{"id": 1, "name": "Aaron Nkrumah", "school": "Tennessee St.", "position": "Wing G", "conf": "OVC", "year": "Sr", "seasonPPG": 17.6, "seed": 15, "region": "Midwest", "opponent": "Iowa St."}, {"id": 2, "name": "Acaden Lewis", "school": "Villanova", "position": "Pure PG", "conf": "BE", "year": "Fr", "seasonPPG": 12.3, "seed": 8, "region": "West", "opponent": "Utah St."}, {"id": 3, "name": "Ace Buckner", "school": "Clemson", "position": "Combo G", "conf": "ACC", "year": "So", "seasonPPG": 8.4, "seed": 8, "region": "South", "opponent": "Iowa"}, {"id": 4, "name": "Adam Miller", "school": "Gonzaga", "position": "Combo G", "conf": "WCC", "year": "Sr", "seasonPPG": 7.6, "seed": 3, "region": "West", "opponent": "Kennesaw St."}, {"id": 5, "name": "Aday Mara", "school": "Michigan", "position": "C", "conf": "B10", "year": "Jr", "seasonPPG": 11.6, "seed": 1, "region": "Midwest", "opponent": "Howard"}, {"id": 6, "name": "Aden Holloway", "school": "Alabama", "position": "Scoring PG", "conf": "SEC", "year": "Jr", "seasonPPG": 16.8, "injuryStatus": "Suspended for weed - status unknown", "seed": 4, "region": "Midwest", "opponent": "Hofstra"}, {"id": 7, "name": "Adlan Elamin", "school": "Utah St.", "position": "Wing F", "conf": "MWC", "year": "Fr", "seasonPPG": 6.5, "seed": 9, "region": "West", "opponent": "Villanova"}, {"id": 8, "name": "Adrian Wooley", "school": "Louisville", "position": "Wing G", "conf": "ACC", "year": "So", "seasonPPG": 8.5, "seed": 6, "region": "East", "opponent": "South Florida"}, {"id": 9, "name": "Aiden Sherrell", "school": "Alabama", "position": "PF/C", "conf": "SEC", "year": "So", "seasonPPG": 11.1, "seed": 4, "region": "Midwest", "opponent": "Hofstra"}, {"id": 10, "name": "AJ Dybantsa", "school": "BYU", "position": "Wing F", "conf": "B12", "year": "Fr", "seasonPPG": 25.3, "seed": 6, "region": "West", "opponent": "Texas"}, {"id": 11, "name": "AJ Levine", "school": "Penn", "position": "Pure PG", "conf": "Ivy", "year": "So", "seasonPPG": 8.3, "seed": 14, "region": "South", "opponent": "Illinois"}, {"id": 12, "name": "AK Okereke", "school": "Vanderbilt", "position": "Wing F", "conf": "SEC", "year": "Sr", "seasonPPG": 9.7, "seed": 5, "region": "South", "opponent": "McNeese St."}];

    const BRACKET_DATA = {"East": [{"seed": "1", "team": "Duke"}, {"seed": "16", "team": "Siena"}, {"seed": "8", "team": "Ohio St."}, {"seed": "9", "team": "TCU"}, {"seed": "5", "team": "St. John's"}, {"seed": "12", "team": "Northern Iowa"}, {"seed": "4", "team": "Kansas"}, {"seed": "13", "team": "Cal Baptist"}, {"seed": "6", "team": "Louisville"}, {"seed": "11", "team": "South Florida"}, {"seed": "3", "team": "Michigan St."}, {"seed": "14", "team": "North Dakota St."}, {"seed": "7", "team": "UCLA"}, {"seed": "10", "team": "UCF"}, {"seed": "2", "team": "Connecticut"}, {"seed": "15", "team": "Furman"}], "West": [{"seed": "1", "team": "Arizona"}, {"seed": "16", "team": "LIU"}, {"seed": "8", "team": "Villanova"}, {"seed": "9", "team": "Utah St."}, {"seed": "5", "team": "Wisconsin"}, {"seed": "12", "team": "High Point"}, {"seed": "4", "team": "Arkansas"}, {"seed": "13", "team": "Hawaii"}, {"seed": "6", "team": "BYU"}, {"seed": "11", "team": "Texas"}, {"seed": "3", "team": "Gonzaga"}, {"seed": "14", "team": "Kennesaw St."}, {"seed": "7", "team": "Miami FL"}, {"seed": "10", "team": "Missouri"}, {"seed": "2", "team": "Purdue"}, {"seed": "15", "team": "Queens"}], "South": [{"seed": "1", "team": "Florida"}, {"seed": "16", "team": "Prairie View A&M"}, {"seed": "16", "team": "Lehigh"}, {"seed": "8", "team": "Clemson"}, {"seed": "9", "team": "Iowa"}, {"seed": "5", "team": "Vanderbilt"}, {"seed": "12", "team": "McNeese St."}, {"seed": "4", "team": "Nebraska"}, {"seed": "13", "team": "Troy"}, {"seed": "6", "team": "North Carolina"}, {"seed": "11", "team": "VCU"}, {"seed": "3", "team": "Illinois"}, {"seed": "14", "team": "Penn"}, {"seed": "7", "team": "Saint Mary's"}, {"seed": "10", "team": "Texas A&M"}, {"seed": "2", "team": "Houston"}, {"seed": "15", "team": "Idaho"}], "Midwest": [{"seed": "1", "team": "Michigan"}, {"seed": "16", "team": "Howard"}, {"seed": "8", "team": "Georgia"}, {"seed": "9", "team": "Saint Louis"}, {"seed": "5", "team": "Texas Tech"}, {"seed": "12", "team": "Akron"}, {"seed": "4", "team": "Alabama"}, {"seed": "13", "team": "Hofstra"}, {"seed": "6", "team": "Tennessee"}, {"seed": "11", "team": "Miami OH"}, {"seed": "11", "team": "SMU"}, {"seed": "3", "team": "Virginia"}, {"seed": "14", "team": "Wright St."}, {"seed": "7", "team": "Kentucky"}, {"seed": "10", "team": "Santa Clara"}, {"seed": "2", "team": "Iowa St."}, {"seed": "15", "team": "Tennessee St."}]};

    const { useState } = React;

    // HELPER: Convert flat array to pairs
    function arrayToPairs(arr) {
      const pairs = [];
      for (let i = 0; i < arr.length; i += 2) {
        pairs.push([arr[i], arr[i + 1]]);
      }
      return pairs;
    }

    // TeamSlot Component
    function TeamSlot({ team, seed, onClick }) {
      const getTeamPlayers = (teamName) => {
        if (!teamName) return [];
        return PLAYERS_DATA.filter(p => p.school === teamName);
      };

      const players = getTeamPlayers(team);

      return (
        <div 
          onClick={() => team && onClick({ name: team, seed, players })}
          className={`flex items-center justify-between px-3 py-2 border border-gray-300 bg-white ${team ? 'cursor-pointer hover:bg-blue-50' : ''} text-sm`}
          style={{ minWidth: '180px' }}
        >
          {team ? (
            <>
              <span className="font-bold text-gray-700 mr-2">{seed}</span>
              <span className="flex-1 font-medium text-gray-900">{team}</span>
            </>
          ) : (
            <span className="text-gray-400">TBD</span>
          )}
        </div>
      );
    }

    // RegionBracket Component
    function RegionBracket({ teams, title, onTeamClick, reverse = false }) {
      const pairs = arrayToPairs(teams);
      const r1Pairs = pairs.slice(0, 8);
      const r2Pairs = [[r1Pairs[0], r1Pairs[1]], [r1Pairs[2], r1Pairs[3]], [r1Pairs[4], r1Pairs[5]], [r1Pairs[6], r1Pairs[7]]];
      const r3Pairs = [[r2Pairs[0], r2Pairs[1]], [r2Pairs[2], r2Pairs[3]]];
      const r4Pair = [r3Pairs[0], r3Pairs[1]];

      const Round1 = () => (
        <div className="flex flex-col gap-14">
          {r1Pairs.map((pair, i) => (
            <div key={i} className="relative flex flex-col gap-1">
              <div className="r1-connector">
                <TeamSlot team={pair[0]?.team || ""} seed={pair[0]?.seed || ""} onClick={onTeamClick} />
              </div>
              <div className="r1-connector">
                <TeamSlot team={pair[1]?.team || ""} seed={pair[1]?.seed || ""} onClick={onTeamClick} />
              </div>
              <div className="pair-line" style={{ top: 'calc(50% - 18px)', height: '36px' }}></div>
            </div>
          ))}
        </div>
      );

      const Round2 = () => (
        <div className="flex flex-col" style={{ gap: '90px' }}>
          {r2Pairs.map((superPair, i) => (
            <div key={i} className="relative flex flex-col gap-14">
              <div className="r1-connector"><TeamSlot team="" seed="" onClick={onTeamClick} /></div>
              <div className="r1-connector"><TeamSlot team="" seed="" onClick={onTeamClick} /></div>
              <div className="pair-line" style={{ top: 'calc(50% - 54px)', height: '108px' }}></div>
            </div>
          ))}
        </div>
      );

      const Round3 = () => (
        <div className="flex flex-col" style={{ gap: '242px' }}>
          {r3Pairs.map((_, i) => (
            <div key={i} className="r1-connector"><TeamSlot team="" seed="" onClick={onTeamClick} /></div>
          ))}
        </div>
      );

      const Round4 = () => (
        <div className="r1-connector"><TeamSlot team="" seed="" onClick={onTeamClick} /></div>
      );

      const content = (
        <>
          <Round1 />
          <div className="round-spacer"></div>
          <Round2 />
          <div className="round-spacer"></div>
          <Round3 />
          <div className="round-spacer"></div>
          <Round4 />
        </>
      );

      return (
        <div className="flex flex-col">
          <div className={`text-xs font-bold text-gray-700 mb-4 ${reverse ? 'text-right' : ''}`}>{title}</div>
          <div className={`flex items-center ${reverse ? 'flex-row-reverse' : ''}`}>
            {content}
          </div>
        </div>
      );
    }

    // TeamModal Component
    function TeamModal({ team, onClose }) {
      if (!team.players || team.players.length === 0) {
        return (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={onClose}>
            <div className="bg-white rounded-lg p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-2xl font-bold text-gray-900">{team.seed} {team.name}</h2>
                <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
              </div>
              <p className="text-gray-600">No player data available for this team.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={onClose}>
          <div className="bg-white rounded-lg p-6 max-w-4xl w-full mx-4 max-h-[80vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-6">
              <div>
                <h2 className="text-3xl font-bold text-gray-900">{team.seed} {team.name}</h2>
                <p className="text-sm text-gray-600 mt-1">{team.players[0].conf} Conference • {team.players.length} Players</p>
              </div>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-3xl leading-none">&times;</button>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="border-b-2 border-gray-300">
                    <th className="text-left px-4 py-3 text-sm font-bold text-gray-700">Player</th>
                    <th className="text-left px-4 py-3 text-sm font-bold text-gray-700">Position</th>
                    <th className="text-left px-4 py-3 text-sm font-bold text-gray-700">PPG</th>
                    <th className="text-left px-4 py-3 text-sm font-bold text-gray-700">Year</th>
                  </tr>
                </thead>
                <tbody>
                  {team.players.map(player => (
                    <tr key={player.id} className="border-b border-gray-200 hover:bg-gray-50">
                      <td className="px-4 py-3">
                        <div className="font-medium text-gray-900">{player.name}</div>
                        {player.injuryStatus && (
                          <div className="text-xs text-red-600 mt-1">⚠️ {player.injuryStatus}</div>
                        )}
                      </td>
                      <td className="px-4 py-3 text-sm text-gray-600">{player.position}</td>
                      <td className="px-4 py-3 text-sm font-semibold text-gray-900">{player.seasonPPG}</td>
                      <td className="px-4 py-3 text-sm text-gray-600">{player.year}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // Main Bracket Component
    function Bracket() {
      const [selectedTeam, setSelectedTeam] = useState(null);

      return (
        <div className="min-h-screen bg-gray-50 p-8">
          <div className="max-w-[1600px] mx-auto">
            <div className="text-center mb-8">
              <h1 className="text-4xl font-bold text-gray-900 mb-2">2026 NCAA Tournament Bracket</h1>
              <p className="text-xl text-gray-600">Potter Cup Basketball Draft</p>
            </div>
            <div className="bg-white rounded-lg shadow-lg p-8">
              <div className="flex justify-between items-start mb-16">
                <RegionBracket teams={BRACKET_DATA.East} title="EAST REGION" onTeamClick={setSelectedTeam} />
                <RegionBracket teams={BRACKET_DATA.West} title="WEST REGION" onTeamClick={setSelectedTeam} reverse={true} />
              </div>
              <div className="mb-16">
                <div className="flex justify-center">
                  <div className="text-center">
                    <svg className="w-48 h-48 mx-auto mb-4" viewBox="0 0 200 200">
                      <circle cx="100" cy="100" r="90" fill="#003366" stroke="#CC0000" strokeWidth="8"/>
                      <text x="100" y="80" textAnchor="middle" fill="white" fontSize="32" fontWeight="bold">FINAL</text>
                      <text x="100" y="115" textAnchor="middle" fill="white" fontSize="32" fontWeight="bold">FOUR</text>
                      <text x="100" y="140" textAnchor="middle" fill="#FFD700" fontSize="16" fontWeight="bold">INDIANAPOLIS</text>
                      <text x="100" y="160" textAnchor="middle" fill="#FFD700" fontSize="14">APRIL 4-6</text>
                    </svg>
                    <div className="mt-6 space-y-2">
                      <div className="flex gap-12 justify-center">
                        <TeamSlot team="" seed="" onClick={setSelectedTeam} />
                        <TeamSlot team="" seed="" onClick={setSelectedTeam} />
                      </div>
                      <div className="text-xs font-bold text-gray-600">NATIONAL CHAMPIONSHIP • APRIL 6</div>
                      <div className="flex justify-center"><TeamSlot team="" seed="" onClick={setSelectedTeam} /></div>
                    </div>
                  </div>
                </div>
              </div>
              <div className="flex justify-between items-start mt-16">
                <RegionBracket teams={BRACKET_DATA.South} title="SOUTH REGION" onTeamClick={setSelectedTeam} />
                <RegionBracket teams={BRACKET_DATA.Midwest} title="MIDWEST REGION" onTeamClick={setSelectedTeam} reverse={true} />
              </div>
            </div>
          </div>
          {selectedTeam && <TeamModal team={selectedTeam} onClose={() => setSelectedTeam(null)} />}
        </div>
      );
    }

    // RENDER
    ReactDOM.render(<Bracket />, document.getElementById('root'));
  </script>
</body>
</html>
